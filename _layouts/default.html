<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <button class="menu-toggle" onclick="document.body.classList.toggle('nav-open')" aria-label="Toggle navigation">Menu</button>
      <div class="nav-links">
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/paper-reviews/' | relative_url }}">Paper Reviews</a>
        <a href="{{ '/projects/' | relative_url }}">Projects</a>
        <a href="{{ '/cv/' | relative_url }}">CV</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
      </div>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ site.time | date: '%Y' }} {{ site.title }}. Built with GitHub Pages and Jekyll.</p>
  </footer>
</body>
</html>
