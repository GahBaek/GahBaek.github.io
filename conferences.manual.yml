# ─────────────────────────────────────────────────────────────────────────────
# 수동으로 관리하는 컨퍼런스 목록
# 자동 소스(sec-deadlines, se-deadlines, ai-deadlines)에 없거나
# 데드라인이 누락된 경우 여기에 추가하세요.
#
# 필수 필드: name, tier, year
# tier 선택지: Sys1 / SE1 / SE2 / AI1 / Sec1 / Sec2 / Sec3 / Sec4
#
# deadline은 리스트로 작성 (멀티 사이클 지원):
#   deadline:
#     - "2026-06-11 23:59"   # Cycle 1
#     - "2026-11-17 23:59"   # Cycle 2
#
# abstract_deadline도 리스트로 작성 (deadline과 순서 대응):
#   abstract_deadline:
#     - "2026-06-04 23:59"   # Cycle 1 abstract
#     - "2026-11-10 23:59"   # Cycle 2 abstract
# ─────────────────────────────────────────────────────────────────────────────

