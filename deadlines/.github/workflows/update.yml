name: Update Conference Deadlines

on:
  schedule:
    # 매일 오전 9시 KST (UTC 00:00) 실행
    - cron: "0 0 * * *"
  workflow_dispatch:  # 수동 실행도 가능

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run crawler
        run: python crawler/crawl.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "chore: update conference deadlines $(date -u +'%Y-%m-%d')"
            git push
          )
